window.onerror = function(msg, src, line, col, err) {
    var d = document.createElement('div');
    d.style = 'position:fixed;top:0;left:0;right:0;z-index:99999;padding:20px 24px;background:#FFF1F2;border-bottom:3px solid #DC2626;font:13px/1.6 monospace;color:#B91C1C;white-space:pre-wrap';

    document.body.appendChild(d);
};
</script>

const LoginScreen = () => {
    const { setUser, setScreen } = useContext(AppCtx);
    const [role,    setRole]    = useState('Operations Manager');
    const [showPw,  setShowPw]  = useState(false);
    const [loading, setLoading] = useState(false);
    const [remember,setRemember]= useState(false);
    const [step,    setStep]    = useState('login');   // 'login' | '2fa'
    const [otp,     setOtp]     = useState(['','','','','','']);
    const [otpErr,  setOtpErr]  = useState(false);
    const [otpLoading,setOtpLoading] = useState(false);
    const otpRef0 = useRef(); const otpRef1 = useRef(); const otpRef2 = useRef();
    const otpRef3 = useRef(); const otpRef4 = useRef(); const otpRef5 = useRef();
    const otpRefs = [otpRef0, otpRef1, otpRef2, otpRef3, otpRef4, otpRef5];

    const handleSubmit = (e) => {
        e.preventDefault();
        setLoading(true);
        setTimeout(() => {
            setLoading(false);
            if (role === 'Super Admin') { setStep('2fa'); }
            else {
                const user = MOCK_USERS.find(u => u.role === role) || MOCK_USERS[1];
                setUser(user);
                setScreen('dashboard');
            }
        }, 900);
    };

    const handleOtpChange = (idx, val) => {
        if (!/^\d*$/.test(val)) return;
        const next = [...otp]; next[idx] = val.slice(-1); setOtp(next); setOtpErr(false);
        if (val && idx < 5) otpRefs[idx+1].current?.focus();
    };
    const handleOtpKey = (idx, e) => {
        if (e.key === 'Backspace' && !otp[idx] && idx > 0) otpRefs[idx-1].current?.focus();
    };
    const handleVerify2FA = () => {
        const code = otp.join('');
        if (code.length < 6) { setOtpErr(true); return; }
        setOtpLoading(true);
        setTimeout(() => {
            setOtpLoading(false);
            // any 6-digit code works in prototype
            const user = MOCK_USERS.find(u => u.role === 'Super Admin');
            setUser(user);
            setScreen('dashboard');
        }, 1000);
    };

    const rolePills = [
        { label:'Super Admin',  bg:'#E8EBFD', color:'#1E2ECC' },
        { label:'Finance',      bg:'#D1FAE5', color:'#065F46' },
        { label:'Compliance',   bg:'#FEF3C7', color:'#92400E' },
        { label:'Operations',   bg:'#E0E7FF', color:'#3730A3' },
    ];

    /* ── 2FA SCREEN ── */
    if (step === '2fa') return (
        <div style={{ display:'flex', width:'100vw', height:'100vh', minHeight:'600px', backgroundColor:'#F3F4FE',
            alignItems:'center', justifyContent:'center' }}>
            <div className="fade-up" style={{ width:'460px', backgroundColor:'#fff', borderRadius:'20px',
                boxShadow:'0 16px 48px rgba(43,61,232,.12)', padding:'48px 40px', textAlign:'center' }}>
                <div style={{ width:'72px', height:'72px', borderRadius:'50%', backgroundColor:'#E8EBFD',
                    display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 24px' }}>
                    <Icon d={IC.lock} size={32} color="#2B3DE8"/>
                </div>
                <h2 style={{ fontSize:'22px', fontWeight:700, color:'#1E293B', marginBottom:'8px' }}>Two-Factor Authentication</h2>
                <p style={{ fontSize:'14px', color:'#64748B', marginBottom:'32px', lineHeight:1.6 }}>
                    Enter the 6-digit code sent to your authenticator app or registered phone number.
                </p>
                <div style={{ display:'flex', gap:'10px', justifyContent:'center', marginBottom:'24px' }}>
                    {otp.map((digit, i) => (
                        <input key={i} ref={otpRefs[i]} type="text" inputMode="numeric" maxLength={1}
                            value={digit} onChange={e=>handleOtpChange(i,e.target.value)}
                            onKeyDown={e=>handleOtpKey(i,e)}
                            style={{ width:'52px', height:'56px', textAlign:'center', fontSize:'24px', fontWeight:700,
                                border: otpErr ? '2px solid #DC2626' : '2px solid #E2E8F0',
                                borderRadius:'10px', color:'#1E293B', backgroundColor:'#F8FAFC',
                                transition:'border-color .15s',
                                outline:'none' }}
                            onFocus={e=>{ e.target.style.borderColor='#2B3DE8'; e.target.style.boxShadow='0 0 0 3px rgba(43,61,232,.12)'; }}
                            onBlur={e=>{ e.target.style.borderColor = otpErr ? '#DC2626' : '#E2E8F0'; e.target.style.boxShadow='none'; }}
                        />
                    ))}
                </div>
                {otpErr && <p style={{ fontSize:'13px', color:'#DC2626', marginBottom:'16px' }}>Please enter all 6 digits.</p>}
                <button onClick={handleVerify2FA} disabled={otpLoading}
                    style={{ width:'100%', height:'48px', backgroundColor: otpLoading ? '#6874F0' : '#2B3DE8',
                        color:'#fff', fontWeight:600, fontSize:'15px', borderRadius:'10px', border:'none', cursor:'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
                        boxShadow:'0 4px 14px rgba(43,61,232,.25)', transition:'background-color .15s' }}>
                    {otpLoading ? (
                        <><div style={{ width:'18px', height:'18px', border:'2.5px solid rgba(255,255,255,.35)', borderTopColor:'#fff', borderRadius:'50%', animation:'spin .7s linear infinite' }}/>Verifying…</>
                    ) : 'Verify & Continue'}
                </button>
                <button onClick={()=>{ setStep('login'); setOtp(['','','','','','']); setOtpErr(false); }}
                    style={{ marginTop:'14px', background:'none', border:'none', color:'#64748B', fontSize:'13px',
                        cursor:'pointer', textDecoration:'underline' }}>
                    Back to login
                </button>
                <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'24px' }}>
                    Prototype: any 6-digit code is accepted
                </p>
            </div>
        </div>
    );

    return (
        <div style={{ display:'flex', width:'100vw', height:'100vh', minHeight:'900px', minWidth:'1280px' }}>
            {/* ── LEFT ── */}
            <div style={{ width:'50%', position:'relative', backgroundColor:'#2B3DE8',
                display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', overflow:'hidden' }}>
                <div style={{ position:'absolute', inset:0, pointerEvents:'none',
                    backgroundImage:'repeating-linear-gradient(135deg,rgba(255,255,255,.045) 0px,rgba(255,255,255,.045) 1px,transparent 1px,transparent 32px)' }}/>
                <div style={{ position:'absolute', inset:0, pointerEvents:'none',
                    background:'radial-gradient(ellipse 70% 60% at 45% 48%,rgba(59,79,234,.28) 0%,transparent 80%)' }}/>

                <div className="fade-up" style={{ position:'relative', zIndex:1, textAlign:'center', padding:'0 64px', maxWidth:'460px' }}>
                    <div style={{ marginBottom:'32px', display:'flex', justifyContent:'center' }}>
                        <div style={{ width:'96px', height:'96px', borderRadius:'50%',
                            backgroundColor:'rgba(255,255,255,.12)', border:'1.5px solid rgba(255,255,255,.25)',
                            display:'flex', alignItems:'center', justifyContent:'center',
                            boxShadow:'0 8px 32px rgba(0,0,0,.2)' }}>
                            <Icon d={IC.shield} size={48} color="rgba(255,255,255,0.92)" />
                        </div>
                    </div>
                    <h2 style={{ fontSize:'32px', fontWeight:700, color:'#fff', lineHeight:1.2, marginBottom:'16px' }}>
                        Secure Admin Access
                    </h2>
                    <p style={{ fontSize:'16px', fontWeight:400, color:'rgba(255,255,255,.7)', lineHeight:1.7 }}>
                        Role-based access control.<br/>All activity logged.
                    </p>
                    <div style={{ display:'flex', gap:'10px', marginTop:'48px', justifyContent:'center', flexWrap:'wrap' }}>
                        {['256-bit SSL','MFA Ready','Audit Trail'].map(b => (
                            <div key={b} style={{ display:'flex', alignItems:'center', gap:'6px',
                                padding:'6px 14px', borderRadius:'9999px',

const LoanBookChart = () => {
    const ref = useRef(null);
    const [w, setW] = useState(600);
    useEffect(() => {
        if (ref.current) setW(ref.current.offsetWidth || 600);
    }, []);

    const RC2 = window.Recharts;
    if (!RC2 || !RC2.AreaChart) return (
        <div ref={ref} style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color:'#94A3B8', fontSize:'13px' }}>
            Chart unavailable — Recharts not loaded
        </div>
    );
    const { AreaChart: AC, Area: Ar, XAxis: Xx, YAxis: Yx, CartesianGrid: Cg, Tooltip: Tt } = RC2;
    return (
        <div ref={ref} style={{ width:'100%', height:'100%' }}>
            <AC width={w} height={220} data={CHART_DATA} margin={{top:4,right:4,bottom:0,left:8}}>
                <defs>
                    <linearGradient id="colorDisb" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%"  stopColor="#6874F0" stopOpacity={0.5}/>
                        <stop offset="95%" stopColor="#6874F0" stopOpacity={0.02}/>
                    </linearGradient>
                    <linearGradient id="colorOut" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%"  stopColor="#2B3DE8" stopOpacity={0.25}/>
                        <stop offset="95%" stopColor="#2B3DE8" stopOpacity={0.02}/>
                    </linearGradient>
                </defs>
                <Cg strokeDasharray="3 3" stroke="#E2E8F0" vertical={false}/>
                <Xx dataKey="d" tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false}/>
                <Yx tickFormatter={v=>`₦${v/1000000}M`} tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false}/>
                <Tt formatter={(v,n)=>[fmtShort(v), n==='disbursed'?'Disbursed':'Outstanding']}
                    contentStyle={{borderRadius:'8px',border:'1px solid #E2E8F0',fontSize:'12px'}}/>
                <Ar type="monotone" dataKey="disbursed"   stroke="#6874F0" strokeWidth={2} fill="url(#colorDisb)" dot={false}/>
                <Ar type="monotone" dataKey="outstanding" stroke="#2B3DE8" strokeWidth={2} fill="url(#colorOut)"  dot={false}/>
            </AC>
        </div>
    );
};

            {historyBorrower && <BorrowerHistoryModal borrower={historyBorrower} onClose={()=>setHistoryBorrower(null)}/>}

            </div>

};

const Sparkline = ({ data, color='#3B4FEA', width=52, height=24 }) => {
    const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
    const pts = data.map((v,i) => {
        const x = (i / (data.length-1)) * width;
        const y = height - ((v - min) / range) * (height - 4) - 2;
        return `${x},${y}`;
    }).join(' ');
    return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow:'visible' }}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
    );
};

const DonutChart = ({ segments, size=200, stroke=28 }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const cx = size/2, cy = size/2;
    let offset = 0;
    return (
        <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
            {segments.map((s,i) => {
                const dash = (s.pct/100) * circ;
                const gap  = circ - dash;
                const el = (
                    <circle key={i} cx={cx} cy={cy} r={r}
                        fill="none" stroke={s.color} strokeWidth={stroke}
                        strokeDasharray={`${dash} ${gap}`}
                        strokeDashoffset={-offset}
                        strokeLinecap="butt"/>
                );
                offset += dash;
                return el;
            })}
        </svg>
    );
};

                                <span style={{ fontSize:'11px', color:'#64748B' }}>Target 75%</span>
                            </div>
                        </div>
                    </div>
                    {/* SVG chart */}
                    {(() => {
                        const W=900, H=160, pad={t:10,r:20,b:30,l:40};
                        const pts = TREND_DATA.map((d,i) => {
                            const x = pad.l + (i/(TREND_DATA.length-1))*(W-pad.l-pad.r);
                            const y = pad.t + (1 - d.r/100)*(H-pad.t-pad.b);
                            return {x,y,d};
                        });
                        const pathD = pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
                        const areaD = pathD + ` L${pts[pts.length-1].x},${H-pad.b} L${pts[0].x},${H-pad.b} Z`;
                        const targetY = pad.t + (1 - 0.75)*(H-pad.t-pad.b);
                        return (
                            <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'160px', overflow:'visible' }}>
                                {/* Grid */}
                                {[0,25,50,75,100].map(v => {
                                    const y = pad.t + (1 - v/100)*(H-pad.t-pad.b);
                                    return <g key={v}>
                                        <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#F1F5F9" strokeWidth="1"/>

                                ))}
                                {/* Area fill */}
                                <path d={areaD} fill="#F3F4FE" opacity="0.6"/>
                                {/* Target line */}
                                <line x1={pad.l} y1={targetY} x2={W-pad.r} y2={targetY}
                                    stroke="#15803D" strokeWidth="1.5" strokeDasharray="6,4"/>
                                {/* Rate line */}
                                <path d={pathD} fill="none" stroke="#3B4FEA" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                                {/* Dots */}
                                {pts.map((p,i) => (
                                    <circle key={i} cx={p.x} cy={p.y} r="3" fill="#3B4FEA" stroke="#fff" strokeWidth="1.5"/>
                                ))}
                            </svg>
                        );
                    })()}

                        padding:'18px 20px', boxShadow:'0 1px 3px rgba(0,0,0,.04)' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'10px' }}>
                            <span style={{ fontSize:'12px', fontWeight:600, color:'#64748B', textTransform:'uppercase', letterSpacing:'.06em' }}>{c.label}</span>
                            <span style={{ fontSize:'20px' }}>{c.icon}</span>
                        </div>
                        <div style={{ fontSize:'15px', fontWeight:700, color:c.color, marginBottom:'4px', lineHeight:1.3 }}>{c.value}</div>
                        <div style={{ fontSize:'11px', color:'#94A3B8' }}>{c.sub}</div>
                    </div>
                ))}
            </div>

            {/* Compliance notices */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'28px' }}>
                <div style={{ backgroundColor:'#F3F4FE', borderRadius:'10px', border:'1px solid #E8EBFD', padding:'16px 20px' }}>
                    <div style={{ fontSize:'12px', fontWeight:700, color:'#1E2ECC', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'.06em' }}>
                        FC-07 · Data Minimisation
                    </div>
                    <p style={{ fontSize:'13px', color:'#334155', lineHeight:1.6 }}>
                        Submission payload uses only <strong>masked BVN/NIN</strong> values already stored on the user record — no re-request or storage of unmasked identity numbers per NDPR/UA-03/UA-04.
                    </p>
                </div>
                <div style={{ backgroundColor:'#FFFBEB', borderRadius:'10px', border:'1px solid #FDE68A', padding:'16px 20px' }}>
                    <div style={{ fontSize:'12px', fontWeight:700, color:'#92400E', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'.06em' }}>
                        FC-04 · Rate Limits
                    </div>
                    <p style={{ fontSize:'13px', color:'#334155', lineHeight:1.6 }}>
                        Payloads are chunked at <strong>10,000 objects max</strong>. Rate limit: 1 req/sec, 100 req/5 min/IP. Exponential backoff on 429. CDT field mapping pending client confirmation.
                    </p>
                </div>
            </div>

            {/* Submission Log Table */}
            <div style={{ backgroundColor:'#fff', borderRadius:'12px', border:'1px solid #E2E8F0', overflow:'hidden' }}>
                <div style={{ padding:'18px 24px', borderBottom:'1px solid #F1F5F9',
                    display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <h3 style={{ fontSize:'14px', fontWeight:700, color:'#1E293B' }}>Weekly Submission Log</h3>
                    <div style={{ fontSize:'12px', color:'#64748B' }}>FC-06 · All attempts logged · queryable by date</div>
                </div>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'13px' }}>
                    <thead>
                        <tr style={{ backgroundColor:'#F8FAFC' }}>
                            {['Submission Date','Record Count','Payload Size','FC Response','Retries','Duration','Status'].map(h=>(
                                <th key={h} style={{ padding:'10px 16px', textAlign:'left', fontSize:'11px',
                                    fontWeight:700, color:'#64748B', textTransform:'uppercase', letterSpacing:'.06em',
                                    borderBottom:'1px solid #E2E8F0', whiteSpace:'nowrap' }}>{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {submissions.map((s,i)=>{
                            const ss = statusStyle[s.status] || statusStyle['Success'];
                            return (
                                <tr key={i} style={{ borderBottom:'1px solid #F1F5F9',
                                    backgroundColor: i%2===0 ? '#fff' : '#FAFAFA' }}>
                                    <td style={{ padding:'13px 16px', fontWeight:600, color:'#1E293B', fontFamily:'monospace', fontSize:'12px' }}>{s.date}</td>
                                    <td style={{ padding:'13px 16px', color:'#334155' }}>{s.records.toLocaleString()}</td>
                                    <td style={{ padding:'13px 16px', color:'#334155' }}>{s.size}</td>
                                    <td style={{ padding:'13px 16px' }}>
                                        <span style={{ fontFamily:'monospace', fontSize:'12px',
                                            color: s.responseCode==='200' ? '#15803D' : '#DC2626',
                                            fontWeight:700 }}>HTTP {s.responseCode}</span>
                                    </td>
                                    <td style={{ padding:'13px 16px', textAlign:'center', color: s.retries>0 ? '#D97706' : '#94A3B8' }}>
                                        {s.retries}
                                    </td>
                                    <td style={{ padding:'13px 16px', color:'#475569', fontFamily:'monospace', fontSize:'12px' }}>{s.duration}</td>
                                    <td style={{ padding:'13px 16px' }}>
                                        <span style={{ padding:'3px 10px', borderRadius:'9999px', fontSize:'11px', fontWeight:700,
                                            backgroundColor:ss.bg, color:ss.color, border:`1px solid ${ss.border}` }}>
                                            {s.status}
                                        </span>
                                    </td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
                <div style={{ padding:'14px 24px', borderTop:'1px solid #F1F5F9', display:'flex', justifyContent:'space-between',
                    alignItems:'center', backgroundColor:'#F8FAFC' }}>
                    <span style={{ fontSize:'12px', color:'#94A3B8' }}>Showing last 7 submissions · Retention: 90 days</span>
                    <button style={{ height:'32px', padding:'0 14px', border:'1px solid #E2E8F0',
                        backgroundColor:'#fff', color:'#475569', borderRadius:'7px', fontSize:'12px',
                        cursor:'pointer', fontWeight:600 }}>Export Log CSV</button>
                </div>
            </div>

            {/* API Reference */}
            <div style={{ marginTop:'20px', backgroundColor:'#0F172A', borderRadius:'12px', padding:'20px 24px' }}>
                <div style={{ fontSize:'12px', fontWeight:700, color:'rgba(255,255,255,.4)', textTransform:'uppercase',
                    letterSpacing:'.08em', marginBottom:'14px' }}>API Endpoints (UAT)</div>
                <div style={{ display:'grid', gap:'8px' }}>
                    {[
                        { method:'POST', path:'/login',       desc:'Authenticate · obtain bearer token', auth:'None' },
                        { method:'POST', path:'/uploadjson',  desc:'Submit weekly consumer loan portfolio', auth:'Bearer' },
                        { method:'POST', path:'/update',      desc:'Incremental status updates (balance, DPD, classification)', auth:'Bearer' },
                    ].map(ep=>(
                        <div key={ep.path} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'8px 12px',
                            backgroundColor:'rgba(255,255,255,.04)', borderRadius:'7px' }}>
                            <span style={{ padding:'2px 8px', borderRadius:'4px', fontSize:'11px', fontWeight:700,
                                backgroundColor:'rgba(59,79,234,.35)', color:'#9099F4', fontFamily:'monospace' }}>{ep.method}</span>
                            <code style={{ fontSize:'12px', color:'#E2E8F0', flex:'0 0 160px' }}>{ep.path}</code>
                            <span style={{ fontSize:'12px', color:'rgba(255,255,255,.5)', flex:1 }}>{ep.desc}</span>
                            <span style={{ fontSize:'11px', color:'rgba(255,255,255,.3)', fontFamily:'monospace' }}>Auth: {ep.auth}</span>
                        </div>
                    ))}
                </div>
                <div style={{ marginTop:'10px', fontSize:'11px', color:'rgba(255,255,255,.25)' }}>
                    Base URL: https://uat.firstcentralcreditbureau.com/datasubmissionv2 · Production URL to be confirmed before go-live
                </div>
            </div>
        </div>
    );
};

/* ─────────────────────────────────────────
   SCREEN ROUTER
───────────────────────────────────────── */

    dashboard:     { title:'Dashboard Home',      breadcrumb:'Overview / Dashboard Home',      component: <DashboardHome/> },
    disbursement:  { title:'Disbursement Log',    breadcrumb:'Overview / Disbursement Log',    component: <DisbursementLog/> },
    repayment:     { title:'Repayment Log',       breadcrumb:'Overview / Repayment Log',       component: <RepaymentLog/> },

    assignment:      { title:'Case Assignment Board', breadcrumb:'Collections / Case Assignment Board', component: <CaseAssignmentBoard/> },
    'agent-activity':{ title:'Agent Activity Log',  breadcrumb:'Collections / Agent Activity Log',   component: <AgentActivityLog/>    },
    dpd:           { title:'DPD Breakdown',       breadcrumb:'Analytics / DPD Breakdown',      component: <DPDBreakdown/> },
    ptp:           { title:'PTP Board',           breadcrumb:'Analytics / PTP Board',          component: <PTPBoard/>      },
    npl:           { title:'PTP Fulfilment Rate', breadcrumb:'Analytics / PTP Board / Fulfilment Rate', component: <PTPFulfilmentRate/> },

    fee:           { title:'Fee Income',          breadcrumb:'Analytics / Fee Income',        component: <FeeIncomeDashboard/>  },
    approvals:     { title:'Approval Queue',      breadcrumb:'Approvals / Approval Queue', component: <ApprovalsQueue/> },
    leaderboard:   { title:'Agent Leaderboard',   breadcrumb:'Performance / Agent Leaderboard', component: <AgentLeaderboard/> },
    'drill-down':  { title:'Agent Drill-Down',    breadcrumb:'Performance / Agent Drill-Down',  component: <AgentDrillDown/>   },
    harassment:    { title:'Harassment Report Tracker', breadcrumb:'Compliance / Harassment Report Tracker', component: <HarassmentTracker/> },
    violations:    { title:'Compliance Violation Logs', breadcrumb:'Compliance / Violation Logs',            component: <ViolationLogs/>       },
    fraud:         { title:'Fraud Flag Dashboard',      breadcrumb:'Compliance / Fraud Flags',               component: <FraudFlagDashboard/>   },
    aml:           { title:'AML/KYC Report',       breadcrumb:'Compliance / AML / KYC Report',   component: <AMLKYCReport/>   },
    'data-access': { title:'Data Access Log',     breadcrumb:'Compliance / Data Access Log',    component: <DataAccessLog/>  },
    'product-config':{ title:'Product Configuration', breadcrumb:'Settings / Product Config',           component: <ProductConfiguration/> },
    bureau:        { title:'Bureau Negative Listing', breadcrumb:'Settings / Bureau Negative Listing',   component: <BureauNegativeListing/>  },
    'debt-sale':   { title:'Debt Sale Export',      breadcrumb:'Settings / Debt Sale Export',      component: <DebtSaleExport/>       },
    'ageing':      { title:'Portfolio Ageing Report',breadcrumb:'Settings / Portfolio Ageing Report',component: <PortfolioAgeingReport/>},
    'system-config':{ title:'System Configuration',      breadcrumb:'Settings / System Config',  component: <SystemConfiguration/> },
    rbac:          { title:'Role & Permission Management',breadcrumb:'Settings / RBAC',           component: <RBACManagement/>       },
    'daily-reports':    { title:'Daily Report Configuration',breadcrumb:'Admin / System Config / Daily Reports', component: <DailyReportConfig/> },
    'loan-settings':    { title:'Loan Contract Settings',  breadcrumb:'Settings / Loan Contract Settings',  component: <LoanContractSettings/> },
    'firstcentral':     { title:'FirstCentral Bureau Integration', breadcrumb:'Compliance / FirstCentral Bureau Integration', component: <FirstCentralIntegration/> },
};

/* ─────────────────────────────────────────
   MAIN APP
───────────────────────────────────────── */
const App = () => {
    const [user,   setUser]   = useState(null);
    const [screen, setScreen] = useState('login');

    const isLogin = !user || screen === 'login';

    if (isLogin) {
        return (
            <AppCtx.Provider value={{ user, setUser, screen, setScreen }}>
                <LoginScreen/>
            </AppCtx.Provider>
        );
    }

    const meta = SCREEN_META[screen] || SCREEN_META['dashboard'];

    return (
        <AppCtx.Provider value={{ user, setUser, screen, setScreen }}>
            <div style={{ display:'flex', minHeight:'100vh' }}>
                <Sidebar/>
                <div style={{ marginLeft:'240px', flex:1, display:'flex', flexDirection:'column', minHeight:'100vh' }}>
                    <Header title={meta.title} breadcrumb={meta.breadcrumb}/>
                    <main style={{ flex:1, overflowY:'auto', backgroundColor:'#F8FAFC' }}>
                        {meta.component || <Placeholder title={meta.title}/>}
                    </main>
                </div>
            </div>
        </AppCtx.Provider>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
